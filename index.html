<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>星际守护者</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0A0A2A;font-family:'Courier New',monospace}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="gc"></canvas>
<script>
(function(){
'use strict';
const C=document.getElementById('gc'),X=C.getContext('2d');
let W,H;
function resize(){W=C.width=window.innerWidth;H=C.height=window.innerHeight}
resize();window.addEventListener('resize',resize);

// ===== Audio Engine =====
const AC=window.AudioContext||window.webkitAudioContext;
let ac=null;
function ensureAudio(){if(!ac)ac=new AC()}
const audioEnabled={value:true};
const musicEnabled={value:true};

function playTone(freq,dur,type,vol,slide){
  if(!audioEnabled.value||!ac)return;
  try{
    const o=ac.createOscillator(),g=ac.createGain();
    o.type=type||'square';o.frequency.value=freq;
    if(slide)o.frequency.linearRampToValueAtTime(slide,ac.currentTime+dur);
    g.gain.value=Math.min(vol||0.1,0.15);
    g.gain.linearRampToValueAtTime(0,ac.currentTime+dur);
    o.connect(g);g.connect(ac.destination);
    o.start();o.stop(ac.currentTime+dur);
  }catch(e){}
}

function sfxShoot(){playTone(880,0.05,'square',0.06,1200)}
function sfxExplode(){playTone(150,0.2,'sawtooth',0.1,50);playTone(80,0.3,'triangle',0.08,30)}
function sfxPickup(){playTone(660,0.08,'sine',0.1,880);setTimeout(()=>playTone(990,0.1,'sine',0.08,1320),80)}
function sfxUpgrade(){playTone(440,0.1,'square',0.08,880);setTimeout(()=>playTone(660,0.1,'square',0.08,1320),100)}
function sfxHit(){playTone(200,0.15,'sawtooth',0.12,60)}
function sfxBoss(){playTone(100,0.5,'sawtooth',0.15,200);playTone(60,0.6,'square',0.1,30)}
function sfxCombo(){playTone(500+game.combo*50,0.08,'sine',0.07,700+game.combo*50)}
function sfxAchieve(){playTone(523,0.1,'sine',0.08);setTimeout(()=>playTone(659,0.1,'sine',0.08),100);setTimeout(()=>playTone(784,0.15,'sine',0.1),200);setTimeout(()=>playTone(1047,0.2,'sine',0.1),300)}

// BGM
let bgmNodes=null;
function startBGM(){
  if(!ac||!musicEnabled.value)return;
  stopBGM();
  try{
    const o1=ac.createOscillator(),o2=ac.createOscillator(),g=ac.createGain();
    o1.type='triangle';o2.type='sawtooth';
    o1.frequency.value=55;o2.frequency.value=82;
    g.gain.value=0.03;
    o1.connect(g);o2.connect(g);g.connect(ac.destination);
    o1.start();o2.start();
    bgmNodes={o1,o2,g};
  }catch(e){}
}
function stopBGM(){
  if(bgmNodes){try{bgmNodes.o1.stop();bgmNodes.o2.stop()}catch(e){}bgmNodes=null}
}
function setBGMVolume(v){if(bgmNodes)bgmNodes.g.gain.value=v*0.03}
function updateBGMTempo(){
  if(!bgmNodes)return;
  const lvl=game.diffLevel;
  const base=55+lvl*8;
  bgmNodes.o1.frequency.value=base;
  bgmNodes.o2.frequency.value=base*1.5;
}

// ===== Storage =====
function loadData(){
  try{return JSON.parse(localStorage.getItem('starGuardian'))||{}}catch(e){return{}}
}
function saveData(d){try{localStorage.setItem('starGuardian',JSON.stringify(d))}catch(e){}}
function getHighScore(){return loadData().highScore||0}
function getLastScore(){return loadData().lastScore||0}
function getMaxDiff(){return loadData().maxDiff||1}
function getAchievements(){return loadData().achievements||[]}
function saveHighScore(s){const d=loadData();if(s>d.highScore)d.highScore=s;saveData(d)}
function saveLastScore(s){const d=loadData();d.lastScore=s;saveData(d)}
function saveMaxDiff(l){const d=loadData();if(l>d.maxDiff)d.maxDiff=l;saveData(d)}
function saveAchievement(name){const d=loadData();if(!d.achievements)d.achievements=[];if(!d.achievements.includes(name)){d.achievements.push(name);saveData(d);return true}return false}
function checkAchievement(name){return getAchievements().includes(name)}

// ===== Quality =====
let lowQuality=false;
function detectQuality(){
  const c=document.createElement('canvas').getContext('2d');
  if(W*H>2500000)lowQuality=true;
}
detectQuality();

// ===== Stars =====
const stars=[];
function initStars(){
  stars.length=0;
  const count=lowQuality?50:120;
  for(let i=0;i<count;i++){
    stars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*2+0.5,sp:Math.random()*2+0.5,b:Math.random()});
  }
}
initStars();

function drawStars(){
  for(const s of stars){
    s.y+=s.sp*(game.state==='playing'?1+game.diffLevel*0.2:0.5);
    if(s.y>H){s.y=0;s.x=Math.random()*W}
    s.b+=0.02;
    const a=0.4+Math.sin(s.b)*0.3;
    X.fillStyle=`rgba(255,255,255,${a})`;
    X.fillRect(s.x,s.y,s.s,s.s);
  }
}

// ===== Colors =====
const COL={
  cyan:'#00FFFF',magenta:'#FF0055',white:'#FFFFFF',
  bg:'#0A0A2A',yellow:'#FFFF00',blue:'#0088FF',
  green:'#00FF88',red:'#FF3344',purple:'#8800FF'
};

const BG_LEVELS=['#0A0A2A','#1A0A3A','#2A0A1A','#1A0000','#050000'];
const BG_NAMES=['深蓝','深紫','深红','黑红','纯黑'];

// ===== Game State =====
const game={
  state:'menu', // menu, playing, paused, gameover
  score:0,combo:0,comboTimer:0,comboMult:1,
  lives:3,maxLives:5,weaponLevel:1,
  diffLevel:1,diffScore:[0,1000,3000,6000,10000],
  invincible:0,shield:0,
  player:null,bullets:[],enemies:[],enemyBullets:[],
  pickups:[],particles:[],
  bossActive:false,bossKills:0,
  diffCooldown:0,
  flashAlpha:0,
  achievementQueue:[],achievementShow:0,achievementText:'',
  scoreAnim:0,comboFlash:0,diffUpAnim:0,
  frameCount:0,spawnTimer:0,bossTimer:0,
};

// ===== Player =====
function createPlayer(){
  return{x:W/2,y:H-80,w:30,h:40,speed:5,flameT:0};
}

function drawPlayer(p){
  if(game.invincible>0&&Math.floor(game.invincible*10)%2===0)return;
  const glow=!lowQuality;
  // Flame
  p.flameT+=0.2;
  const fh=15+Math.sin(p.flameT)*5;
  if(glow){X.shadowColor=COL.cyan;X.shadowBlur=10}
  X.fillStyle=COL.cyan;
  X.beginPath();
  X.moveTo(p.x,p.y-p.h/2);
  X.lineTo(p.x-p.w/2,p.y+p.h/2);
  X.lineTo(p.x,p.y+p.h/2-fh);
  X.lineTo(p.x+p.w/2,p.y+p.h/2);
  X.closePath();X.fill();
  // Flame tail
  X.fillStyle='#0088FF';
  X.beginPath();
  X.moveTo(p.x-6,p.y+p.h/2);
  X.lineTo(p.x,p.y+p.h/2+fh+8);
  X.lineTo(p.x+6,p.y+p.h/2);
  X.closePath();X.fill();
  X.shadowBlur=0;
  // Shield
  if(game.shield>0){
    X.strokeStyle=`rgba(0,136,255,${0.5+Math.sin(game.frameCount*0.1)*0.3})`;
    X.lineWidth=2;X.beginPath();
    X.arc(p.x,p.y,p.w+8,0,Math.PI*2);X.stroke();
  }
}

// ===== Enemies =====
function spawnEnemy(type){
  const e={type,x:Math.random()*(W-60)+30,y:-40,vy:1,vx:0,hp:1,maxHp:1,shootTimer:0,age:0};
  switch(type){
    case'basic':e.w=24;e.h=24;e.vy=1.5+game.diffLevel*0.3;e.hp=e.maxHp=1;break;
    case'fast':e.w=20;e.h=20;e.vy=3+game.diffLevel*0.2;e.hp=e.maxHp=1;e.type='fast';break;
    case'tracker':e.w=22;e.h=22;e.vy=1.2+game.diffLevel*0.15;e.hp=e.maxHp=2;e.type='tracker';break;
    case'heavy':e.w=36;e.h=36;e.vy=0.8;e.hp=e.maxHp=5;e.type='heavy';break;
    case'boss':e.w=70;e.h=70;e.vy=0.5;e.hp=e.maxHp=20;e.type='boss';e.x=W/2;e.shootTimer=0;break;
  }
  game.enemies.push(e);
}

function drawEnemy(e){
  const glow=!lowQuality;
  const dmg=1-e.hp/e.maxHp;
  const baseCol=e.type==='boss'?COL.magenta:
    e.type==='heavy'?COL.red:
    e.type==='tracker'?COL.purple:
    e.type==='fast'?COL.yellow:COL.magenta;
  if(glow){X.shadowColor=baseCol;X.shadowBlur=8}
  X.fillStyle=baseCol;
  switch(e.type){
    case'basic':
      X.fillRect(e.x-e.w/2,e.y-e.h/2,e.w,e.h);break;
    case'fast':
      X.beginPath();X.moveTo(e.x,e.y-e.h/2);
      X.lineTo(e.x+e.w/2,e.y+e.h/2);
      X.lineTo(e.x-e.w/2,e.y+e.h/2);X.closePath();X.fill();break;
    case'tracker':
      X.beginPath();X.arc(e.x,e.y,e.w/2,0,Math.PI*2);X.fill();break;
    case'heavy':
      X.fillRect(e.x-e.w/2,e.y-e.h/2,e.w,e.h);
      X.strokeStyle='rgba(255,255,255,0.3)';X.lineWidth=1;
      X.strokeRect(e.x-e.w/2+4,e.y-e.h/2+4,e.w-8,e.h-8);break;
    case'boss':
      X.beginPath();
      for(let i=0;i<6;i++){
        const a=Math.PI/3*i-Math.PI/2;
        const px=e.x+Math.cos(a)*e.w/2,py=e.y+Math.sin(a)*e.h/2;
        i===0?X.moveTo(px,py):X.lineTo(px,py);
      }
      X.closePath();X.fill();
      X.strokeStyle=COL.yellow;X.lineWidth=2;
      X.beginPath();X.arc(e.x,e.y,e.w/3,0,Math.PI*2);X.stroke();
      break;
  }
  X.shadowBlur=0;
  // HP bar for boss/heavy
  if(e.type==='boss'||e.type==='heavy'){
    const bw=e.w;
    X.fillStyle='rgba(255,0,0,0.5)';X.fillRect(e.x-bw/2,e.y-e.h/2-8,bw,4);
    X.fillStyle=COL.cyan;X.fillRect(e.x-bw/2,e.y-e.h/2-8,bw*(e.hp/e.maxHp),4);
  }
}

// ===== Bullets =====
function spawnBullet(x,y,angle,speed,owner){
  const b={x,y,vx:Math.sin(angle)*speed,vy:-Math.cos(angle)*speed,owner,age:0};
  if(owner==='player'){
    b.w=3;b.h=12;b.color=COL.cyan;b.speed=speed;
  }else{
    b.w=4;b.h=8;b.color=COL.magenta;b.speed=speed;
  }
  if(owner==='player')game.bullets.push(b);else game.enemyBullets.push(b);
}

function drawBullet(b){
  if(!lowQuality){X.shadowColor=b.color;X.shadowBlur=6}
  X.fillStyle=b.color;
  X.fillRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h);
  if(!lowQuality){
    X.globalAlpha=0.3;
    X.fillRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h+4);
    X.globalAlpha=1;
  }
  X.shadowBlur=0;
}

// ===== Pickups =====
function spawnPickup(x,y,type){
  game.pickups.push({x,y,type,vy:1.5,age:0,w:16,h:16});
}

function drawPickup(p){
  const col=p.type==='weapon'?COL.blue:p.type==='shield'?COL.green:p.type==='bomb'?COL.yellow:COL.red;
  const pulse=1+Math.sin(p.age*0.15)*0.3;
  if(!lowQuality){X.shadowColor=col;X.shadowBlur=10}
  X.fillStyle=col;
  // Star shape
  const spikes=5,outerR=p.w*pulse,innerR=p.w*pulse*0.5;
  X.beginPath();
  for(let i=0;i<spikes*2;i++){
    const r=i%2===0?outerR:innerR;
    const a=Math.PI/spikes*i-Math.PI/2+p.age*0.05;
    const px=p.x+Math.cos(a)*r,py=p.y+Math.sin(a)*r;
    i===0?X.moveTo(px,py):X.lineTo(px,py);
  }
  X.closePath();X.fill();
  X.shadowBlur=0;
}

// ===== Particles =====
function spawnParticles(x,y,count,color1,color2,speed){
  if(lowQuality)count=Math.floor(count/3);
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2;
    const s=Math.random()*(speed||3)+1;
    game.particles.push({
      x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      life:1,decay:0.02+Math.random()*0.02,
      size:Math.random()*3+1,
      color:Math.random()>0.5?color1:color2
    });
  }
}

function drawParticles(){
  for(let i=game.particles.length-1;i>=0;i--){
    const p=game.particles[i];
    p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;
    if(p.life<=0){game.particles.splice(i,1);continue}
    X.globalAlpha=p.life;
    X.fillStyle=p.color;
    X.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  }
  X.globalAlpha=1;
}

// ===== Input =====
const keys={};
let touchX=null,touchActive=false;
window.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Escape'){
    if(game.state==='playing'){game.state='paused';setBGMVolume(0.5)}
    else if(game.state==='paused'){game.state='playing';setBGMVolume(1)}
  }
  if(game.state==='menu'&&e.code){startGame()}
  if(game.state==='gameover'&&e.code){goToMenu()}
});
window.addEventListener('keyup',e=>{keys[e.code]=false});

C.addEventListener('touchstart',e=>{
  e.preventDefault();ensureAudio();
  if(game.state==='menu'){startGame();return}
  if(game.state==='gameover'){goToMenu();return}
  const t=e.touches[0];
  touchX=t.clientX;touchActive=true;
},{passive:false});
C.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(game.state==='playing'&&e.touches[0]){
    const t=e.touches[0];
    touchX=t.clientX;touchActive=true;
  }
},{passive:false});
C.addEventListener('touchend',e=>{touchActive=false;touchX=null});

C.addEventListener('click',e=>{
  ensureAudio();
  const mx=e.clientX,my=e.clientY;
  if(game.state==='menu'){startGame();return}
  if(game.state==='gameover'){goToMenu();return}
  if(game.state==='playing'){
    // Check buttons
    const bx=W-40,by=10,bs=30;
    // Pause button
    if(mx>bx&&mx<bx+bs&&my>by&&my<by+bs){game.state='paused';setBGMVolume(0.5);return}
    // Sound button
    if(mx>bx-35&&mx<bx-5&&my>by&&my<by+bs){audioEnabled.value=!audioEnabled.value;return}
  }
  if(game.state==='paused'){
    // Continue
    if(my>H/2-20&&my<H/2+20){game.state='playing';setBGMVolume(1);return}
    // Sound toggle
    if(my>H/2+30&&my<H/2+60){audioEnabled.value=!audioEnabled.value;return}
    // Quality toggle
    if(my>H/2+70&&my<H/2+100){lowQuality=!lowQuality;return}
    // Menu
    if(my>H/2+110&&my<H/2+140){goToMenu();return}
  }
});

// ===== Game Logic =====
function startGame(){
  ensureAudio();
  game.state='playing';
  game.score=0;game.combo=0;game.comboTimer=0;game.comboMult=1;
  game.lives=3;game.weaponLevel=1;game.diffLevel=1;
  game.invincible=0;game.shield=0;
  game.player=createPlayer();
  game.bullets=[];game.enemies=[];game.enemyBullets=[];
  game.pickups=[];game.particles=[];
  game.bossActive=false;game.bossKills=0;game.diffCooldown=0;
  game.spawnTimer=0;game.bossTimer=0;game.frameCount=0;
  game.flashAlpha=0;game.achievementQueue=[];
  startBGM();updateBGMTempo();
}

function goToMenu(){
  game.state='menu';stopBGM();
}

function gameOver(){
  game.state='gameover';
  stopBGM();
  saveHighScore(game.score);saveLastScore(game.score);saveMaxDiff(game.diffLevel);
  // Achievements
  if(!checkAchievement('初出茅庐')){saveAchievement('初出茅庐');showAchievement('初出茅庐')}
  if(game.score>=10000&&!checkAchievement('百步穿杨')){saveAchievement('百步穿杨');showAchievement('百步穿杨')}
  if(game.combo>=10&&!checkAchievement('连战连捷')){saveAchievement('连战连捷');showAchievement('连战连捷')}
  if(game.lives>=5&&!checkAchievement('生命不息')){saveAchievement('生命不息');showAchievement('生命不息')}
  if(game.diffLevel>=5&&!checkAchievement('极限挑战')){saveAchievement('极限挑战');showAchievement('极限挑战')}
  // Copy score text
  game.shareText=`🌟星际守护者🌟 得分:${game.score} 最高连击:${game.combo} 难度:${game.diffLevel}`;
}

function showAchievement(text){
  game.achievementQueue.push(text);
  if(!game.achievementText){game.achievementText=game.achievementQueue.shift();game.achievementShow=180}
  sfxAchieve();
}

function addScore(pts){
  game.score+=Math.floor(pts*game.comboMult);
  game.scoreAnim=10;
  // Difficulty
  for(let i=game.diffLevel;i<5;i++){
    if(game.score>=game.diffScore[i]){
      game.diffLevel=i+1;game.diffUpAnim=60;
      updateBGMTempo();
      if(game.diffLevel>=5&&!checkAchievement('极限挑战')){saveAchievement('极限挑战');showAchievement('极限挑战')}
    }
  }
}

function updateCombo(){
  game.comboTimer=90; // 1.5s at 60fps
  game.combo++;
  if(game.combo>=10&&!checkAchievement('连战连捷')){saveAchievement('连战连捷');showAchievement('连战连捷')}
  if(game.combo>=20&&!checkAchievement('无人能挡')){saveAchievement('无人能挡');showAchievement('无人能挡')}
  if(game.combo<5)game.comboMult=1;
  else if(game.combo<10)game.comboMult=1.2;
  else if(game.combo<15)game.comboMult=1.5;
  else if(game.combo<20)game.comboMult=1.8;
  else game.comboMult=2;
  sfxCombo();
}

function playerHit(){
  if(game.invincible>0||game.shield>0)return;
  game.lives--;game.invincible=120;game.combo=0;game.comboMult=1;game.comboTimer=0;
  sfxHit();spawnParticles(game.player.x,game.player.y,15,COL.magenta,COL.white,2);
  if(game.lives<=0)gameOver();
}

function update(){
  if(game.state!=='playing')return;
  game.frameCount++;
  const p=game.player;
  if(!p)return;

  // Player movement
  let dx=0;
  if(keys['ArrowLeft']||keys['KeyA'])dx=-p.speed;
  if(keys['ArrowRight']||keys['KeyD'])dx=p.speed;
  if(touchActive&&touchX!==null)dx=(touchX-p.x)*0.1;
  p.x+=dx;
  p.x=Math.max(p.w/2,Math.min(W-p.w/2,p.x));

  // Auto shoot (mobile) or space
  if(keys['Space']||touchActive){
    if(game.frameCount%8===0){
      sfxShoot();
      if(game.weaponLevel===1)spawnBullet(p.x,p.y-p.h/2,0,8,'player');
      else if(game.weaponLevel===2){
        spawnBullet(p.x-8,p.y-p.h/2,-0.05,8,'player');
        spawnBullet(p.x+8,p.y-p.h/2,0.05,8,'player');
      }else{
        spawnBullet(p.x,p.y-p.h/2,0,8,'player');
        spawnBullet(p.x-12,p.y-p.h/2,-0.1,8,'player');
        spawnBullet(p.x+12,p.y-p.h/2,0.1,8,'player');
      }
    }
  }else if(game.frameCount%10===0&&keys['Space']===false){
    // PC: only shoot on space
  }

  // Timers
  if(game.invincible>0)game.invincible--;
  if(game.shield>0)game.shield--;
  if(game.comboTimer>0){game.comboTimer--;if(game.comboTimer<=0){game.combo=0;game.comboMult=1}}
  if(game.scoreAnim>0)game.scoreAnim--;
  if(game.diffUpAnim>0)game.diffUpAnim--;
  if(game.achievementShow>0){game.achievementShow--;if(game.achievementShow<=0&&game.achievementQueue.length>0){game.achievementText=game.achievementQueue.shift();game.achievementShow=180}else if(game.achievementShow<=0)game.achievementText=''}
  if(game.diffCooldown>0)game.diffCooldown--;

  // Spawn enemies
  game.spawnTimer--;
  if(game.spawnTimer<=0&&!game.bossActive){
    const interval=Math.max(20,60-game.diffLevel*8);
    game.spawnTimer=interval;
    const r=Math.random();
    if(game.diffLevel>=4&&r<0.15)spawnEnemy('heavy');
    else if(game.diffLevel>=3&&r<0.3)spawnEnemy('tracker');
    else if(game.diffLevel>=2&&r<0.5)spawnEnemy('fast');
    else spawnEnemy('basic');
    // Extra enemies at higher diff
    if(game.diffLevel>=3&&Math.random()<0.3)spawnEnemy('basic');
    if(game.diffLevel>=5&&Math.random()<0.2)spawnEnemy('fast');
  }

  // Boss spawn
  game.bossTimer++;
  if(game.bossTimer>=3000&&!game.bossActive&&game.diffLevel>=2){
    game.bossTimer=0;game.bossActive=true;
    spawnEnemy('boss');sfxBoss();
  }

  // Update enemies
  for(let i=game.enemies.length-1;i>=0;i--){
    const e=game.enemies[i];e.age++;
    if(e.type==='tracker'){
      const dx2=p.x-e.x;e.vx=Math.sign(dx2)*0.8;
    }
    e.x+=e.vx;e.y+=e.vy;
    // Boss behavior
    if(e.type==='boss'){
      if(e.y>80){e.vy=0;e.x+=Math.sin(e.age*0.02)*1.5}
      e.shootTimer++;
      if(e.shootTimer>=40){
        e.shootTimer=0;
        const angles=[-0.3,-0.15,0,0.15,0.3];
        for(const a of angles)spawnBullet(e.x,e.y+e.h/2,a,3,'enemy');
      }
    }
    // Tracker/heavy shoot
    if((e.type==='tracker'||e.type==='heavy')&&e.y>0){
      e.shootTimer++;
      const shootInt=e.type==='heavy'?80:120;
      if(e.shootTimer>=shootInt){
        e.shootTimer=0;
        const ang=Math.atan2(p.x-e.x,p.y-e.y);
        spawnBullet(e.x,e.y+e.h/2,ang-1.57,2.5,'enemy');
      }
    }
    // Off screen
    if(e.y>H+50||e.x<-50||e.x>W+50){game.enemies.splice(i,1);continue}
    // Collision with player
    if(Math.abs(e.x-p.x)<(e.w+p.w)/2&&Math.abs(e.y-p.y)<(e.h+p.h)/2){
      playerHit();
      if(e.type!=='boss'){game.enemies.splice(i,1);spawnParticles(e.x,e.y,8,COL.magenta,COL.yellow,2)}
    }
  }

  // Update player bullets
  for(let i=game.bullets.length-1;i>=0;i--){
    const b=game.bullets[i];b.x+=b.vx;b.y+=b.vy;b.age++;
    if(b.y<-20||b.x<-20||b.x>W+20){game.bullets.splice(i,1);continue}
    // Hit enemies
    let hit=false;
    for(let j=game.enemies.length-1;j>=0;j--){
      const e=game.enemies[j];
      if(Math.abs(b.x-e.x)<e.w/2+4&&Math.abs(b.y-e.y)<e.h/2+4){
        e.hp--;hit=true;
        if(e.hp<=0){
          const pts=e.type==='boss'?500:e.type==='heavy'?50:e.type==='tracker'?30:e.type==='fast'?20:10;
          addScore(pts);updateCombo();
          spawnParticles(e.x,e.y,e.type==='boss'?30:12,COL.yellow,COL.magenta,e.type==='boss'?4:2);
          sfxExplode();
          // Drop pickup
          const dropChance=e.type==='boss'?1:e.type==='heavy'?0.5:0.12;
          if(Math.random()<dropChance){
            const types=['weapon','shield','bomb','life'];
            const weights=e.type==='boss'?[0.3,0.2,0.3,0.2]:[0.4,0.2,0.25,0.15];
            let r2=Math.random(),acc=0,pt='weapon';
            for(let k=0;k<types.length;k++){acc+=weights[k];if(r2<acc){pt=types[k];break}}
            spawnPickup(e.x,e.y,pt);
          }
          // Boss killed
          if(e.type==='boss'){
            game.bossActive=false;game.bossKills++;
            game.diffCooldown=300; // brief difficulty reduction
            if(!checkAchievement('星际霸主')){saveAchievement('星际霸主');showAchievement('星际霸主')}
            // Drop multiple pickups
            spawnPickup(e.x-20,e.y,'weapon');spawnPickup(e.x+20,e.y,'bomb');
            spawnPickup(e.x,e.y-20,'life');
          }
          game.enemies.splice(j,1);
        }
        break;
      }
    }
    if(hit)game.bullets.splice(i,1);
  }

  // Update enemy bullets
  for(let i=game.enemyBullets.length-1;i>=0;i--){
    const b=game.enemyBullets[i];b.x+=b.vx;b.y+=b.vy;b.age++;
    if(b.y>H+20||b.y<-20||b.x<-20||b.x>W+20){game.enemyBullets.splice(i,1);continue}
    // Hit player
    if(Math.abs(b.x-p.x)<(p.w+4)/2&&Math.abs(b.y-p.y)<(p.h+4)/2){
      playerHit();game.enemyBullets.splice(i,1);
    }
  }

  // Update pickups
  for(let i=game.pickups.length-1;i>=0;i--){
    const pk=game.pickups[i];pk.y+=pk.vy;pk.age++;
    if(pk.y>H+30){game.pickups.splice(i,1);continue}
    if(Math.abs(pk.x-p.x)<24&&Math.abs(pk.y-p.y)<24){
      sfxPickup();
      switch(pk.type){
        case'weapon':game.weaponLevel=Math.min(3,game.weaponLevel+1);sfxUpgrade();break;
        case'shield':game.shield=300;break;
        case'bomb':
          addScore(game.enemies.length*10);
          for(const en of game.enemies)spawnParticles(en.x,en.y,8,COL.yellow,COL.magenta,2);
          game.enemies=[];game.enemyBullets=[];
          game.flashAlpha=0.5;break;
        case'life':
          game.lives=Math.min(game.maxLives,game.lives+1);
          if(game.lives>=5&&!checkAchievement('生命不息')){saveAchievement('生命不息');showAchievement('生命不息')}
          break;
      }
      spawnParticles(pk.x,pk.y,6,COL.yellow,COL.white,2);
      game.pickups.splice(i,1);
    }
  }

  // Flash decay
  if(game.flashAlpha>0)game.flashAlpha-=0.02;
  if(game.comboMult>=1.5)game.comboFlash=1;else game.comboFlash=0;
}

// ===== Drawing =====
function drawBG(){
  const lvl=game.diffLevel-1;
  const col=game.diffCooldown>0?BG_LEVELS[Math.max(0,lvl-1)]:BG_LEVELS[Math.min(4,lvl)];
  X.fillStyle=col;X.fillRect(0,0,W,H);
  // Lightning at level 5
  if(game.diffLevel>=5&&!lowQuality&&Math.random()<0.02){
    X.strokeStyle='rgba(255,0,50,0.3)';X.lineWidth=2;
    X.beginPath();let lx=Math.random()*W,ly=0;
    for(let i=0;i<8;i++){lx+=(Math.random()-0.5)*40;ly+=H/8;X.lineTo(lx,ly)}
    X.stroke();
  }
}

function drawHUD(){
  // Score
  const scoreScale=game.scoreAnim>0?1+game.scoreAnim*0.02:1;
  X.save();X.translate(15,30);X.scale(scoreScale,scoreScale);
  X.fillStyle=COL.yellow;X.font='bold 18px Courier New';X.textAlign='left';
  X.fillText('分数: '+game.score,0,0);
  X.restore();

  // Combo
  if(game.combo>1){
    X.fillStyle=game.comboFlash?COL.yellow:COL.cyan;
    X.font='bold 14px Courier New';X.textAlign='left';
    X.fillText(`×${game.comboMult} 连击(${game.combo})`,15,55);
    if(game.comboFlash&&!lowQuality){
      X.fillStyle='rgba(255,255,0,0.1)';X.fillRect(0,0,W,H);
    }
  }

  // Lives
  X.fillStyle=COL.magenta;X.textAlign='right';
  for(let i=0;i<game.lives;i++){
    const lx=W-20-i*22,ly=20;
    X.beginPath();X.moveTo(lx,ly-8);X.lineTo(lx+6,ly+6);X.lineTo(lx-6,ly+6);X.closePath();X.fill();
  }

  // Diff level
  const diffText='难度: Lv'+game.diffLevel;
  X.fillStyle=game.diffUpAnim>0?COL.yellow:COL.cyan;
  X.font='14px Courier New';X.textAlign='left';
  X.fillText(diffText,15,H-15);
  if(game.diffUpAnim>0){
    X.globalAlpha=game.diffUpAnim/60;
    X.font='bold 24px Courier New';X.fillText('难度提升!',W/2-60,H/2);
    X.globalAlpha=1;
  }

  // Weapon level
  X.fillStyle=COL.cyan;X.font='14px Courier New';X.textAlign='right';
  X.fillText('武器: Lv'+game.weaponLevel,W-15,H-15);

  // Buttons
  // Pause
  X.fillStyle='rgba(255,255,255,0.5)';X.fillRect(W-35,10,20,20);
  X.fillStyle=COL.white;X.fillRect(W-32,14,4,12);X.fillRect(W-24,14,4,12);
  // Sound
  X.fillStyle=COL.white;X.font='16px sans-serif';X.textAlign='center';
  X.fillText(audioEnabled.value?'🔊':'🔇',W-55,26);
}

function drawMenu(){
  X.fillStyle=BG_LEVELS[0];X.fillRect(0,0,W,H);
  drawStars();

  // Title
  const t=Date.now()*0.003;
  const hue=(t*20)%360;
  if(!lowQuality){X.shadowColor=`hsl(${hue},100%,60%)`;X.shadowBlur=20}
  X.fillStyle=`hsl(${hue},100%,70%)`;
  X.font='bold 42px Courier New';X.textAlign='center';
  X.fillText('星际守护者',W/2,H*0.2);
  X.shadowBlur=0;

  // Ship display
  const shipY=H*0.4;
  X.fillStyle=COL.cyan;
  X.beginPath();X.moveTo(W/2,shipY-25);X.lineTo(W/2-20,shipY+25);X.lineTo(W/2,shipY+15);X.lineTo(W/2+20,shipY+25);X.closePath();X.fill();
  // Flame
  const fh2=15+Math.sin(t*2)*5;
  X.fillStyle='#0088FF';
  X.beginPath();X.moveTo(W/2-6,shipY+25);X.lineTo(W/2,shipY+25+fh2+8);X.lineTo(W/2+6,shipY+25);X.closePath();X.fill();

  // Rotating stars
  for(let i=0;i<6;i++){
    const a=t+i*Math.PI/3;const r=80;
    const sx=W/2+Math.cos(a)*r,sy=shipY+Math.sin(a)*r;
    X.fillStyle=COL.yellow;X.fillRect(sx-2,sy-2,4,4);
  }

  // Start prompt
  X.fillStyle=COL.white;X.font='18px Courier New';
  X.fillText('点击屏幕 / 按任意键开始',W/2,H*0.6);

  // Controls
  X.fillStyle='rgba(255,255,255,0.6)';X.font='13px Courier New';
  X.fillText('电脑: ← → 移动  空格射击  ESC暂停',W/2,H*0.68);
  X.fillText('手机: 滑动移动  自动射击',W/2,H*0.73);

  // Records
  X.fillStyle=COL.yellow;X.font='14px Courier New';
  X.fillText('历史最高分: '+getHighScore(),W/2,H*0.82);
  X.fillStyle='rgba(255,255,255,0.5)';
  X.fillText('上次得分: '+getLastScore()+'  |  最高难度: Lv'+getMaxDiff(),W/2,H*0.87);

  // Achievements
  const achs=getAchievements();
  if(achs.length>0){
    X.fillStyle=COL.cyan;X.font='12px Courier New';
    X.fillText('成就: '+achs.join(' | '),W/2,H*0.93);
  }
}

function drawPaused(){
  X.fillStyle='rgba(0,0,0,0.5)';X.fillRect(0,0,W,H);
  X.fillStyle=COL.cyan;X.font='bold 28px Courier New';X.textAlign='center';
  X.fillText('游戏暂停',W/2,H/2-20);
  X.fillStyle=COL.white;X.font='16px Courier New';
  X.fillText('继续游戏',W/2,H/2+15);
  X.fillText('音量: '+(audioEnabled.value?'开':'关'),W/2,H/2+45);
  X.fillText('画质: '+(lowQuality?'低':'标准'),W/2,H/2+75);
  X.fillText('返回主菜单',W/2,H/2+105);
}

function drawGameOver(){
  X.fillStyle='rgba(10,10,42,0.85)';X.fillRect(0,0,W,H);

  // Title
  if(!lowQuality){X.shadowColor=COL.magenta;X.shadowBlur=15}
  X.fillStyle=COL.magenta;X.font='bold 36px Courier New';X.textAlign='center';
  X.fillText('游戏结束',W/2,H*0.2);
  X.shadowBlur=0;

  // Stats
  X.fillStyle=COL.white;X.font='18px Courier New';
  X.fillText('得分: '+game.score,W/2,H*0.33);
  X.fillText('最高连击: '+game.combo,W/2,H*0.38);
  X.fillText('达成难度: Lv'+game.diffLevel,W/2,H*0.43);
  X.fillStyle=COL.yellow;
  X.fillText('历史最高分: '+getHighScore(),W/2,H*0.5);

  // Buttons
  X.fillStyle=COL.cyan;X.font='16px Courier New';
  X.fillText('点击重新开始',W/2,H*0.6);
  X.fillStyle='rgba(255,255,255,0.6)';X.font='13px Courier New';
  X.fillText('点击任意处返回',W/2,H*0.67);

  // Achievement
  if(game.achievementText&&game.achievementShow>0){
    X.fillStyle=COL.yellow;X.font='bold 16px Courier New';
    X.fillText('🏆 成就解锁: '+game.achievementText,W/2,H*0.78);
  }
}

// Achievement notification during gameplay
function drawAchievementNotify(){
  if(game.achievementText&&game.achievementShow>0){
    const a=Math.min(1,game.achievementShow/30);
    X.save();X.globalAlpha=a;
    X.fillStyle='rgba(0,0,0,0.7)';
    const tw=X.measureText('🏆 '+game.achievementText).width+40;
    X.fillRect(W/2-tw/2,60,tw,36);
    X.fillStyle=COL.yellow;X.font='bold 14px Courier New';X.textAlign='center';
    X.fillText('🏆 '+game.achievementText,W/2,83);
    X.restore();
  }
}

// ===== Main Loop =====
function loop(){
  requestAnimationFrame(loop);
  resize();

  if(game.state==='menu'){
    drawMenu();
  }else if(game.state==='playing'){
    update();
    drawBG();drawStars();
    for(const pk of game.pickups)drawPickup(pk);
    for(const e of game.enemies)drawEnemy(e);
    for(const b of game.bullets)drawBullet(b);
    for(const b of game.enemyBullets)drawBullet(b);
    if(game.player)drawPlayer(game.player);
    drawParticles();
    if(game.flashAlpha>0){X.fillStyle=`rgba(255,255,0,${game.flashAlpha})`;X.fillRect(0,0,W,H)}
    drawHUD();
    drawAchievementNotify();
  }else if(game.state==='paused'){
    drawBG();drawStars();
    for(const e of game.enemies)drawEnemy(e);
    if(game.player)drawPlayer(game.player);
    drawHUD();
    drawPaused();
  }else if(game.state==='gameover'){
    drawBG();drawStars();
    drawGameOver();
  }
}

// Start
initStars();
loop();

})();
</script>
</body>
